services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: hardened_monorepo
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U admin']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    environment:
      DATABASE_URL: postgres://admin:password123@postgres:5432/hardened_monorepo
      JWT_ACCESS_SECRET: local-dev-access-secret-must-be-at-least-32-chars!!
      JWT_REFRESH_SECRET: local-dev-refresh-secret-must-be-at-least-32-chars!
      NODE_ENV: development
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        BACKEND_API_URL: http://api:3001
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
    depends_on:
      - api

volumes:
  pgdata:
